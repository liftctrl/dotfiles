# --- Core Settings ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1

set -g status-position top
set -g status-justify centre

set-option -g renumber-windows on

# Diable the [exited] message and close pane immediately

set -g remain-on-exit off

# --- Prefix and Keys (Fixed) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Ensure 'c' creates a new window with the current path
unbind c
bind c new-window -c "#{pane_current_path}"

# Navigation (Alt + hjkl) - No prefix needed
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Catppuccin Macchiato Theme Customization ---
set -g @catppuccin_flavor 'macchiato'

# Load the plugin first to set the base colors
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux
run ~/.config/tmux/plugins/tmux-sensible/sensible.tmux

# --- Status Bar Appearance (The "Clean & Square" Look) ---
set -g status-bg "#24273a"  # Matches Alacritty BG
set -g status-left ""
set -g status-right ""

# [Inactive Window]
# Grey index, Sky Blue name, flat background
setw -g window-status-format "#[fg=#6e738d,bg=#24273a] #I #[fg=#91d7e3,bg=#24273a] #W "

# [Active Window]
# Purple (Mauve) block for number, Darker Grey block for folder name
# This creates a "tab" or "label" effect
setw -g window-status-current-format "#[fg=#24273a,bg=#c6a0f6,bold] #I #[fg=#91d7e3,bg=#363a4f,bold] #W "

# Command bar colors
set -g message-style "fg=#c6a0f6,bg=#24273a"
